<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image — BiteBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0D0D0D;
      color: #FFFFFF;
    }

    .og-container {
      width: 1200px;
      height: 630px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 80px;
      background:
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0, 230, 118, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 30%, rgba(0, 230, 118, 0.05) 0%, transparent 60%),
        #0D0D0D;
    }

    /* Subtle grid pattern */
    .og-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Green accent line at top */
    .og-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00E676 0%, #69F0AE 50%, #B2FF59 100%);
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      object-fit: cover;
    }

    .app-badge {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #00E676;
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.2);
      padding: 6px 16px;
      border-radius: 20px;
    }

    .title {
      font-family: 'Poppins', sans-serif;
      font-size: 96px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .title .bloom {
      background: linear-gradient(135deg, #00E676 0%, #69F0AE 50%, #B2FF59 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .features {
      display: flex;
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
    }

    .feature-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00E676;
      flex-shrink: 0;
    }

    /* Decorative glow orb */
    .glow-orb {
      position: absolute;
      bottom: -40px;
      right: -40px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 230, 118, 0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <div class="glow-orb"></div>

    <div class="top-row">
      <img src="favicon.png" alt="BiteBloom icon" class="app-icon">
      <span class="app-badge">AI-Powered Nutrition Tracking</span>
    </div>

    <h1 class="title">Bite<span class="bloom">Bloom</span></h1>
    <p class="tagline">Your AI Nutrition Companion</p>

    <div class="features">
      <div class="feature">
        <span class="feature-dot"></span>
        Snap &amp; Analyze Meals
      </div>
      <div class="feature">
        <span class="feature-dot"></span>
        Track 16 Nutrients
      </div>
      <div class="feature">
        <span class="feature-dot"></span>
        AI-Powered Insights
      </div>
    </div>
  </div>
</body>
</html>
